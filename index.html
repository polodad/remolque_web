<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remolque Hidráulico 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e;
    --fg: #e8ece9;
    --muted: #6b7c71;
    --accent: #f0a500;
    --accent2: #d4380d;
    --card: rgba(22, 28, 24, 0.85);
    --border: rgba(240, 165, 0, 0.2);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Source Sans 3', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }
  #canvas-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }
  .controls-panel {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 12px;
    align-items: center;
    background: var(--card);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .ctrl-btn {
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.25s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .ctrl-btn.raise {
    background: linear-gradient(135deg, #f0a500, #e08c00);
    color: #1a1200;
  }
  .ctrl-btn.raise:hover {
    background: linear-gradient(135deg, #ffc233, #f0a500);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(240,165,0,0.4);
  }
  .ctrl-btn.lower {
    background: linear-gradient(135deg, #d4380d, #b52f0a);
    color: #fff;
  }
  .ctrl-btn.lower:hover {
    background: linear-gradient(135deg, #f04e1a, #d4380d);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(212,56,13,0.4);
  }
  .ctrl-btn.reset {
    background: rgba(255,255,255,0.08);
    color: var(--fg);
    border: 1px solid var(--border);
  }
  .ctrl-btn.reset:hover {
    background: rgba(255,255,255,0.15);
    transform: translateY(-2px);
  }
  .angle-display {
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--accent);
    min-width: 80px;
    text-align: center;
  }
  .angle-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .info-bar {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: var(--card);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 28px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .info-bar h1 {
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--accent);
    margin-bottom: 2px;
  }
  .info-bar p {
    font-size: 12px;
    color: var(--muted);
  }
  .specs-panel {
    position: fixed;
    top: 100px;
    right: 20px;
    z-index: 10;
    background: var(--card);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    min-width: 200px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .specs-panel h3 {
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .spec-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 13px;
  }
  .spec-row .label { color: var(--muted); }
  .spec-row .value { color: var(--fg); font-weight: 600; }
  .speed-control {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .speed-control label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 80px;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }
  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    z-index: 100;
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--accent);
    opacity: 0;
    transition: all 0.4s ease;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  @media (max-width: 768px) {
    .specs-panel { display: none; }
    .controls-panel { padding: 10px 14px; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .ctrl-btn { padding: 8px 14px; font-size: 12px; }
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div class="info-bar">
  <h1>Remolque Hidráulico 3D</h1>
  <p>Arrastra para rotar — Scroll para zoom — Controles para operar la basculante</p>
</div>

<div class="specs-panel">
  <h3>Especificaciones</h3>
  <div class="spec-row"><span class="label">Capacidad</span><span class="value">20 Ton</span></div>
  <div class="spec-row"><span class="label">Ejes</span><span class="value">3</span></div>
  <div class="spec-row"><span class="label">Largo cama</span><span class="value">7 m</span></div>
  <div class="spec-row"><span class="label">Ancho</span><span class="value">2.4 m</span></div>
  <div class="spec-row"><span class="label">Cilindros</span><span class="value">2</span></div>
  <div class="spec-row"><span class="label">Presión</span><span class="value">250 bar</span></div>
  <div class="spec-row"><span class="label">Ángulo máx.</span><span class="value">45°</span></div>
  <div class="spec-row"><span class="label">Neumáticos</span><span class="value">11R22.5</span></div>
</div>

<div class="controls-panel">
  <div class="speed-control">
    <label>Velocidad</label>
    <input type="range" id="speedSlider" min="0.2" max="3" step="0.1" value="1">
  </div>
  <button class="ctrl-btn raise" id="btnRaise">Elevar</button>
  <button class="ctrl-btn lower" id="btnLower">Descender</button>
  <button class="ctrl-btn reset" id="btnReset">Reiniciar</button>
  <div>
    <div class="angle-display" id="angleDisplay">0°</div>
    <div class="angle-label">Ángulo</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// === Variables globales ===
let scene, camera, renderer, controls;
let trailerGroup, bedPivotGroup;
let cylLeft, cylRight; // Grupos de cilindros hidráulicos
let wheels = [];
let targetAngle = 0;
let currentAngle = 0;
let speedMultiplier = 1;

const MAX_ANGLE = THREE.MathUtils.degToRad(45);
const BED_LENGTH = 7;
// Pivote en la parte TRASERA del remolque (donde están llantas y luces)
const BED_PIVOT_X = 3.0;

// Posiciones de los cilindros (en coords del mundo para la base, y del bedGroup para el attachment)
const CYL_BASE_POS_LEFT = new THREE.Vector3(-0.3, 0.55, -0.38);
const CYL_BASE_POS_RIGHT = new THREE.Vector3(-0.3, 0.55, 0.38);
// Punto de attachment en bedGroup local (cerca del frente de la cama)
const CYL_ATTACH_LOCAL_LEFT = new THREE.Vector3(-2.0, -0.04, -0.38);
const CYL_ATTACH_LOCAL_RIGHT = new THREE.Vector3(-2.0, -0.04, 0.38);

init();
animate();

function init() {
  const container = document.getElementById('canvas-container');

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0d0f0e, 0.01);

  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(6, 5, 10);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  container.appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.target.set(0, 1.5, 0);
  controls.minDistance = 4;
  controls.maxDistance = 35;
  controls.maxPolarAngle = Math.PI / 2.05;

  setupLights();
  setupGround();
  buildTrailer();
  setupEnvironment();

  window.addEventListener('resize', onResize);
  document.getElementById('btnRaise').addEventListener('click', () => {
    targetAngle = MAX_ANGLE;
    showToast('Basculando — elevando cama hidráulica');
  });
  document.getElementById('btnLower').addEventListener('click', () => {
    targetAngle = 0;
    showToast('Descendiendo — bajando cama hidráulica');
  });
  document.getElementById('btnReset').addEventListener('click', () => {
    targetAngle = 0;
    currentAngle = 0;
    showToast('Posición reiniciada');
  });
  document.getElementById('speedSlider').addEventListener('input', (e) => {
    speedMultiplier = parseFloat(e.target.value);
  });
}

function setupLights() {
  const ambient = new THREE.AmbientLight(0x3a4a40, 0.6);
  scene.add(ambient);

  const sun = new THREE.DirectionalLight(0xfff4e0, 2.5);
  sun.position.set(10, 15, 8);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.left = -20;
  sun.shadow.camera.right = 20;
  sun.shadow.camera.top = 20;
  sun.shadow.camera.bottom = -20;
  sun.shadow.camera.near = 1;
  sun.shadow.camera.far = 50;
  sun.shadow.bias = -0.001;
  scene.add(sun);

  const fill = new THREE.DirectionalLight(0x8ecae6, 0.5);
  fill.position.set(-8, 5, -6);
  scene.add(fill);

  const accent = new THREE.PointLight(0xf0a500, 1.2, 18);
  accent.position.set(0, 0.5, 3);
  scene.add(accent);

  const hemi = new THREE.HemisphereLight(0x87ceeb, 0x362a1a, 0.3);
  scene.add(hemi);
}

function setupGround() {
  const groundGeo = new THREE.PlaneGeometry(100, 100);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a1f1c, roughness: 0.9, metalness: 0.1 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  const grid = new THREE.GridHelper(60, 60, 0x2a3530, 0x1e2823);
  grid.position.y = 0.01;
  scene.add(grid);
}

// === Materiales ===
function getMaterials() {
  return {
    chassis: new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.5, metalness: 0.8 }),
    bed: new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.6, metalness: 0.4 }),
    bedFloor: new THREE.MeshStandardMaterial({ color: 0x3a3530, roughness: 0.8, metalness: 0.2 }),
    hydraulic: new THREE.MeshStandardMaterial({ color: 0xc0c0c0, roughness: 0.2, metalness: 0.95 }),
    hydraulicRod: new THREE.MeshStandardMaterial({ color: 0xe0e0e0, roughness: 0.1, metalness: 1.0 }),
    wheel: new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.7, metalness: 0.3 }),
    tire: new THREE.MeshStandardMaterial({ color: 0x0f0f0f, roughness: 0.95, metalness: 0.05 }),
    accent: new THREE.MeshStandardMaterial({ color: 0xf0a500, roughness: 0.3, metalness: 0.7, emissive: 0xf0a500, emissiveIntensity: 0.15 }),
    red: new THREE.MeshStandardMaterial({ color: 0xd4380d, roughness: 0.4, metalness: 0.6, emissive: 0xd4380d, emissiveIntensity: 0.1 }),
    reflector: new THREE.MeshStandardMaterial({ color: 0xff2222, emissive: 0xff0000, emissiveIntensity: 0.8, roughness: 0.1, metalness: 0.9 }),
    reflectorAmber: new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xff8800, emissiveIntensity: 0.6, roughness: 0.1, metalness: 0.9 }),
    hitch: new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.3, metalness: 0.9 }),
    spring: new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.4, metalness: 0.7 }),
    axle: new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.4, metalness: 0.8 }),
    mudguard: new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.6, metalness: 0.5 }),
    white: new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5, metalness: 0.3 }),
  };
}

// === Construcción del remolque ===
function buildTrailer() {
  const mat = getMaterials();
  trailerGroup = new THREE.Group();

  /*
   * LAYOUT (vista superior, eje X):
   *
   *   FRENTE (enganche)          PARTE TRASERA (luces/descarga)
   *   ←––––––––––––––––––––––––––––––––––––––––––––––––––→ +X
   *   X = -7.5         X = 0              X = +3.0  X = +3.5
   *   [Enganche]  [Cilindros↑]  [Cama...]  [Pivote] [Luces]
   *                            [Ejes: 1.5, 2.25, 3.0]
   */

  // ─── CHASIS ───
  // Vigas principales longitudinales
  for (let side = -1; side <= 1; side += 2) {
    const beamGeo = new THREE.BoxGeometry(8, 0.18, 0.16);
    const beam = new THREE.Mesh(beamGeo, mat.chassis);
    beam.position.set(-0.5, 0.65, side * 0.6);
    beam.castShadow = true;
    beam.receiveShadow = true;
    trailerGroup.add(beam);
  }

  // Travesaños del chasis
  for (let i = -3.5; i <= 2.5; i += 1.0) {
    const crossGeo = new THREE.BoxGeometry(0.1, 0.14, 1.2);
    const cross = new THREE.Mesh(crossGeo, mat.chassis);
    cross.position.set(i, 0.6, 0);
    cross.castShadow = true;
    trailerGroup.add(cross);
  }

  // Lanza (tongue) — conecta al camión, lado FRONTAL (X negativo)
  const tongueGeo = new THREE.BoxGeometry(2.8, 0.12, 0.1);
  const tongue = new THREE.Mesh(tongueGeo, mat.chassis);
  tongue.position.set(-6.2, 0.7, 0);
  tongue.castShadow = true;
  trailerGroup.add(tongue);

  // Refuerzo diagonal de la lanza
  const diagGeo = new THREE.BoxGeometry(1.5, 0.08, 0.08);
  const diag = new THREE.Mesh(diagGeo, mat.chassis);
  diag.position.set(-5.2, 0.55, 0);
  diag.rotation.z = 0.35;
  trailerGroup.add(diag);

  // Ojo de remolque (hitch) — extremo frontal
  const hitchGroup = new THREE.Group();
  const hitchPlate = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.22, 0.22), mat.hitch);
  hitchGroup.add(hitchPlate);
  const hitchRing = new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.03, 10, 20), mat.hitch);
  hitchRing.rotation.y = Math.PI / 2;
  hitchRing.position.x = -0.14;
  hitchGroup.add(hitchRing);
  hitchGroup.position.set(-7.6, 0.7, 0);
  hitchGroup.castShadow = true;
  trailerGroup.add(hitchGroup);

  // Gato de apoyo delantero
  const jackOuter = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 1.0, 8), mat.hydraulic);
  jackOuter.position.set(-5.2, 0.35, 0);
  trailerGroup.add(jackOuter);
  const jackInner = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.4, 8), mat.hydraulicRod);
  jackInner.position.set(-5.2, -0.15, 0);
  trailerGroup.add(jackInner);
  const jackFoot = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.03, 0.15), mat.chassis);
  jackFoot.position.set(-5.2, -0.35, 0);
  trailerGroup.add(jackFoot);
  // Manivela
  const crankHandle = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 0.3, 6), mat.hydraulic);
  crankHandle.rotation.z = Math.PI / 2;
  crankHandle.position.set(-5.2, 0.85, 0.2);
  trailerGroup.add(crankHandle);
  const crankKnob = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 6), mat.hydraulic);
  crankKnob.position.set(-5.2, 0.85, 0.35);
  trailerGroup.add(crankKnob);

  // ─── EJES Y RUEDAS (3 ejes traseros) ───
  const axlePositions = [1.5, 2.25, 3.0];
  axlePositions.forEach((axleX) => {
    // Eje
    const axleGeo = new THREE.CylinderGeometry(0.03, 0.03, 2.0, 8);
    const axleMesh = new THREE.Mesh(axleGeo, mat.axle);
    axleMesh.rotation.x = Math.PI / 2;
    axleMesh.position.set(axleX, 0.38, 0);
    trailerGroup.add(axleMesh);

    // Ballestas
    for (let side = -1; side <= 1; side += 2) {
      const springGeo = new THREE.BoxGeometry(0.8, 0.04, 0.1);
      const spring = new THREE.Mesh(springGeo, mat.spring);
      spring.position.set(axleX, 0.48, side * 0.4);
      trailerGroup.add(spring);
      // Soporte de ballesta
      const hangerGeo = new THREE.BoxGeometry(0.06, 0.15, 0.06);
      const hanger = new THREE.Mesh(hangerGeo, mat.chassis);
      hanger.position.set(axleX - 0.35, 0.55, side * 0.4);
      trailerGroup.add(hanger);
      const hanger2 = hanger.clone();
      hanger2.position.x = axleX + 0.35;
      trailerGroup.add(hanger2);
    }

    // Ruedas dobles por lado
    for (let side = -1; side <= 1; side += 2) {
      for (let w = -1; w <= 1; w += 2) {
        const wheelGroup = createWheel(mat);
        wheelGroup.position.set(axleX, 0.33, side * (0.65 + w * 0.12));
        trailerGroup.add(wheelGroup);
        wheels.push(wheelGroup);
      }
    }
  });

  // Guardafangos trasero (cubriendo los 3 ejes)
  const mudGeo = new THREE.BoxGeometry(2.8, 0.03, 1.8);
  const mud = new THREE.Mesh(mudGeo, mat.mudguard);
  mud.position.set(2.25, 0.95, 0);
  mud.castShadow = true;
  trailerGroup.add(mud);
  // Soportes del guardafangos
  for (let side = -1; side <= 1; side += 2) {
    const supGeo = new THREE.BoxGeometry(0.04, 0.15, 0.04);
    const sup = new THREE.Mesh(supGeo, mat.chassis);
    sup.position.set(1.2, 0.85, side * 0.7);
    trailerGroup.add(sup);
    const sup2 = sup.clone();
    sup2.position.x = 3.3;
    trailerGroup.add(sup2);
  }

  // ─── CAMA BASCULANTE ───
  // La cama se monta en bedPivotGroup que rota alrededor del pivote trasero.
  // El pivote está en X = BED_PIVOT_X (parte trasera, cerca de los ejes).
  // La cama se extiende hacia el FRENTE (-X) desde el pivote.
  // Cuando el pivote rota positivamente en Z, el frente sube.

  const bedGroup = new THREE.Group();

  // Piso de la cama
  const floorGeo = new THREE.BoxGeometry(BED_LENGTH, 0.06, 2.1);
  const floor = new THREE.Mesh(floorGeo, mat.bedFloor);
  floor.position.set(0, 0.03, 0);
  floor.castShadow = true;
  floor.receiveShadow = true;
  bedGroup.add(floor);

  // Costados
  for (let side = -1; side <= 1; side += 2) {
    const sideGeo = new THREE.BoxGeometry(BED_LENGTH, 0.45, 0.05);
    const sidePanel = new THREE.Mesh(sideGeo, mat.bed);
    sidePanel.position.set(0, 0.285, side * 1.025);
    sidePanel.castShadow = true;
    sidePanel.receiveShadow = true;
    bedGroup.add(sidePanel);

    // Reflejantes laterales
    for (let r = -2.5; r <= 2.5; r += 1.25) {
      const isRed = Math.abs(r) > 1.5;
      const refMat = isRed ? mat.reflector : mat.reflectorAmber;
      const refGeo = new THREE.BoxGeometry(0.08, 0.04, 0.015);
      const ref = new THREE.Mesh(refGeo, refMat);
      ref.position.set(r, 0.44, side * 1.05);
      bedGroup.add(ref);
    }

    // Franja reflectiva
    const stripeGeo = new THREE.BoxGeometry(BED_LENGTH - 0.3, 0.02, 0.008);
    const stripe = new THREE.Mesh(stripeGeo, mat.accent);
    stripe.position.set(0, 0.1, side * 1.05);
    bedGroup.add(stripe);
  }

  // Cabecera (panel frontal, lado del enganche) — en -BED_LENGTH/2
  const frontPanelGeo = new THREE.BoxGeometry(0.05, 0.45, 2.1);
  const frontPanel = new THREE.Mesh(frontPanelGeo, mat.bed);
  frontPanel.position.set(-BED_LENGTH / 2, 0.285, 0);
  frontPanel.castShadow = true;
  bedGroup.add(frontPanel);

  // Borde superior de la cabecera
  const frontTopGeo = new THREE.BoxGeometry(0.07, 0.04, 2.12);
  const frontTop = new THREE.Mesh(frontTopGeo, mat.accent);
  frontTop.position.set(-BED_LENGTH / 2, 0.52, 0);
  bedGroup.add(frontTop);

  // ─── COLA (parte TRASERA, lado de descarga) — en +BED_LENGTH/2 ───
  // Borde de la cola
  const tailGeo = new THREE.BoxGeometry(0.04, 0.1, 2.1);
  const tail = new THREE.Mesh(tailGeo, mat.accent);
  tail.position.set(BED_LENGTH / 2, 0.08, 0);
  tail.castShadow = true;
  bedGroup.add(tail);

  // Luces TRASERAS — en +BED_LENGTH/2 (lado de descarga, junto al pivote)
  for (let side = -1; side <= 1; side += 2) {
    // Luz de freno/parada
    const brakeGeo = new THREE.BoxGeometry(0.05, 0.1, 0.14);
    const brake = new THREE.Mesh(brakeGeo, mat.reflector);
    brake.position.set(BED_LENGTH / 2 + 0.03, 0.35, side * 0.7);
    bedGroup.add(brake);

    // Luz de giro
    const turnGeo = new THREE.BoxGeometry(0.05, 0.07, 0.08);
    const turn = new THREE.Mesh(turnGeo, mat.reflectorAmber);
    turn.position.set(BED_LENGTH / 2 + 0.03, 0.46, side * 0.7);
    bedGroup.add(turn);

    // Luz de retroceso (blanca)
    const revGeo = new THREE.BoxGeometry(0.04, 0.06, 0.06);
    const revMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.3, roughness: 0.1 });
    const rev = new THREE.Mesh(revGeo, revMat);
    rev.position.set(BED_LENGTH / 2 + 0.03, 0.28, side * 0.55);
    bedGroup.add(rev);

    // Catadióptrico (reflejante rojo grande)
    const catGeo = new THREE.BoxGeometry(0.03, 0.08, 0.1);
    const cat = new THREE.Mesh(catGeo, mat.reflector);
    cat.position.set(BED_LENGTH / 2 + 0.03, 0.18, side * 0.85);
    bedGroup.add(cat);
  }

  // Placa de licencia (en la parte trasera)
  const plateGeo = new THREE.BoxGeometry(0.02, 0.1, 0.3);
  const plate = new THREE.Mesh(plateGeo, mat.white);
  plate.position.set(BED_LENGTH / 2 + 0.03, 0.15, 0);
  plate.rotation.y = Math.PI / 2;
  bedGroup.add(plate);

  // Reforzamientos transversales debajo de la cama
  for (let i = -2.5; i <= 2.5; i += 1.0) {
    const ribGeo = new THREE.BoxGeometry(0.05, 0.05, 2.0);
    const rib = new THREE.Mesh(ribGeo, mat.chassis);
    rib.position.set(i, -0.025, 0);
    bedGroup.add(rib);
  }

  // Viga central inferior (donde se conectan los cilindros)
  const underBeamGeo = new THREE.BoxGeometry(4, 0.06, 0.08);
  const underBeam = new THREE.Mesh(underBeamGeo, mat.chassis);
  underBeam.position.set(-1, -0.05, 0);
  bedGroup.add(underBeam);

  // Puntos de conexión para los cilindros (soportes en la cama)
  for (let side = -1; side <= 1; side += 2) {
    const bracketGeo = new THREE.BoxGeometry(0.15, 0.1, 0.06);
    const bracket = new THREE.Mesh(bracketGeo, mat.chassis);
    bracket.position.set(-2, -0.06, side * 0.38);
    bedGroup.add(bracket);
  }

  // Escalón trasero
  for (let side = -1; side <= 1; side += 2) {
    const stepGeo = new THREE.BoxGeometry(0.2, 0.025, 0.2);
    const step = new THREE.Mesh(stepGeo, mat.accent);
    step.position.set(BED_LENGTH / 2 - 0.12, -0.2, side * 0.45);
    bedGroup.add(step);
    // Soporte del escalón
    const legGeo = new THREE.BoxGeometry(0.02, 0.18, 0.02);
    const leg = new THREE.Mesh(legGeo, mat.chassis);
    leg.position.set(BED_LENGTH / 2 - 0.12, -0.11, side * 0.35);
    bedGroup.add(leg);
  }

  // ─── Offset de la cama: el borde trasero queda en el pivote ───
  // En bedGroup local, +BED_LENGTH/2 es el borde trasero.
  // Queremos que ese borde esté en X=0 del pivote.
  // bedGroup.position.x = -(BED_LENGTH/2) desplaza la cama para que su
  // borde trasero quede en el origen del pivote.
  bedGroup.position.set(-BED_LENGTH / 2, 0, 0);

  // ─── Grupo pivote (en la parte TRASERA) ───
  bedPivotGroup = new THREE.Group();
  bedPivotGroup.position.set(BED_PIVOT_X, 0.83, 0);
  bedPivotGroup.add(bedGroup);
  trailerGroup.add(bedPivotGroup);

  // Pasador del pivote (eje de rotación visible)
  const pinGeo = new THREE.CylinderGeometry(0.03, 0.03, 1.5, 12);
  const pin = new THREE.Mesh(pinGeo, mat.hydraulic);
  pin.rotation.x = Math.PI / 2;
  pin.position.set(BED_PIVOT_X, 0.83, 0);
  trailerGroup.add(pin);

  // Soportes del pivote en el chasis
  for (let side = -1; side <= 1; side += 2) {
    const bracketGeo = new THREE.BoxGeometry(0.12, 0.25, 0.06);
    const bracket = new THREE.Mesh(bracketGeo, mat.chassis);
    bracket.position.set(BED_PIVOT_X, 0.78, side * 0.65);
    trailerGroup.add(bracket);
  }

  // ─── CILINDROS HIDRÁULICOS ───
  // La base está en el chasis, la varilla se conecta a la parte inferior de la cama.
  // Se orientan por IK cada frame en animate().

  cylLeft = createHydraulicCylinder(mat, 1.2, 0.045, 0.025);
  trailerGroup.add(cylLeft);

  cylRight = createHydraulicCylinder(mat, 1.2, 0.045, 0.025);
  trailerGroup.add(cylRight);

  // Soportes de los cilindros en el chasis (montaje fijo)
  for (let side = -1; side <= 1; side += 2) {
    const mountGeo = new THREE.BoxGeometry(0.15, 0.15, 0.06);
    const mount = new THREE.Mesh(mountGeo, mat.chassis);
    mount.position.set(-0.3, 0.6, side * 0.38);
    trailerGroup.add(mount);
    // Segundo soporte más bajo
    const mount2Geo = new THREE.BoxGeometry(0.1, 0.2, 0.05);
    const mount2 = new THREE.Mesh(mount2Geo, mat.chassis);
    mount2.position.set(-0.3, 0.5, side * 0.38);
    trailerGroup.add(mount2);
  }

  // Depósito hidráulico
  const tankGeo = new THREE.BoxGeometry(0.5, 0.25, 0.35);
  const tank = new THREE.Mesh(tankGeo, mat.accent);
  tank.position.set(-1.8, 0.8, 0);
  tank.castShadow = true;
  trailerGroup.add(tank);
  // Tapa
  const tankCapGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.03, 8);
  const tankCap = new THREE.Mesh(tankCapGeo, mat.hydraulic);
  tankCap.position.set(-1.8, 0.94, 0);
  trailerGroup.add(tankCap);
  // Etiqueta del depósito
  const labelGeo = new THREE.BoxGeometry(0.01, 0.1, 0.18);
  const labelMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5 });
  const label = new THREE.Mesh(labelGeo, labelMat);
  label.position.set(-1.55, 0.8, 0);
  trailerGroup.add(label);

  // Mangueras hidráulicas
  for (let side = -1; side <= 1; side += 2) {
    const hoseCurve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(-1.55, 0.7, side * 0.18),
      new THREE.Vector3(-0.9, 0.55, side * 0.32),
      new THREE.Vector3(-0.3, 0.6, side * 0.38),
    ]);
    const hoseGeo = new THREE.TubeGeometry(hoseCurve, 12, 0.012, 6, false);
    const hose = new THREE.Mesh(hoseGeo, mat.accent);
    trailerGroup.add(hose);
  }

  // ─── Defensa trasera ───
  const bumperGeo = new THREE.BoxGeometry(0.05, 0.12, 2.0);
  const bumper = new THREE.Mesh(bumperGeo, mat.chassis);
  bumper.position.set(3.4, 0.4, 0);
  trailerGroup.add(bumper);

  scene.add(trailerGroup);
}

// Crear rueda completa
function createWheel(mat) {
  const group = new THREE.Group();

  // Llanta
  const rimGeo = new THREE.CylinderGeometry(0.18, 0.18, 0.1, 16);
  const rim = new THREE.Mesh(rimGeo, mat.wheel);
  rim.rotation.x = Math.PI / 2;
  rim.castShadow = true;
  group.add(rim);

  // Neumático
  const tireGeo = new THREE.TorusGeometry(0.24, 0.08, 10, 20);
  const tireMesh = new THREE.Mesh(tireGeo, mat.tire);
  tireMesh.rotation.y = Math.PI / 2;
  tireMesh.castShadow = true;
  group.add(tireMesh);

  // Tuerca central
  const nutGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.12, 6);
  const nut = new THREE.Mesh(nutGeo, mat.hydraulic);
  nut.rotation.x = Math.PI / 2;
  group.add(nut);

  return group;
}

// Crear cilindro hidráulico (cuerpo + varilla)
function createHydraulicCylinder(mat, bodyLen, bodyRadius, rodRadius) {
  const group = new THREE.Group();

  // Cuerpo del cilindro
  const bodyGeo = new THREE.CylinderGeometry(bodyRadius, bodyRadius, bodyLen, 10);
  const body = new THREE.Mesh(bodyGeo, mat.hydraulic);
  body.position.y = bodyLen / 2;
  body.castShadow = true;
  group.add(body);

  // Tapas del cilindro
  const capGeo = new THREE.CylinderGeometry(bodyRadius + 0.01, bodyRadius + 0.01, 0.04, 10);
  const capTop = new THREE.Mesh(capGeo, mat.hydraulic);
  capTop.position.y = bodyLen / 2 + 0.02;
  group.add(capTop);
  const capBot = new THREE.Mesh(capGeo, mat.hydraulic);
  capBot.position.y = -bodyLen / 2 + 0.02;
  group.add(capBot);

  // Varilla (pistón)
  const rodGeo = new THREE.CylinderGeometry(rodRadius, rodRadius, bodyLen * 0.6, 8);
  const rod = new THREE.Mesh(rodGeo, mat.hydraulicRod);
  rod.position.y = bodyLen + bodyLen * 0.3;
  rod.castShadow = true;
  group.add(rod);

  // Cabeza del pistón
  const headGeo = new THREE.CylinderGeometry(bodyRadius * 0.7, bodyRadius * 0.7, 0.05, 10);
  const head = new THREE.Mesh(headGeo, mat.hydraulic);
  head.position.y = bodyLen + bodyLen * 0.6;
  group.add(head);

  // Montaje inferior (ojo)
  const eyeGeo = new THREE.TorusGeometry(bodyRadius + 0.02, 0.015, 6, 12);
  const eye = new THREE.Mesh(eyeGeo, mat.hydraulic);
  eye.position.y = -bodyLen / 2 - 0.02;
  eye.rotation.x = Math.PI / 2;
  group.add(eye);

  // Guardar referencias para animación
  group.userData = { body, rod, head, bodyLen, rodRadius };

  return group;
}

// Orientar cilindro hidráulico usando IK (base → objetivo)
function updateCylinderIK(cylGroup, baseWorld, targetWorld) {
  const direction = new THREE.Vector3().subVectors(targetWorld, baseWorld);
  const distance = direction.length();
  if (distance < 0.01) return;

  direction.normalize();

  // Posicionar en la base
  cylGroup.position.copy(baseWorld);

  // Orientar: el eje local +Y debe apuntar hacia targetWorld
  const up = new THREE.Vector3(0, 1, 0);
  const quaternion = new THREE.Quaternion().setFromUnitVectors(up, direction);
  cylGroup.quaternion.copy(quaternion);

  // Ajustar extensión de la varilla según la distancia
  const { bodyLen, rod, head } = cylGroup.userData;
  const extension = Math.max(0, distance - bodyLen * 0.7);
  const rodScale = 1 + extension / (bodyLen * 0.6);
  rod.scale.y = rodScale;
  rod.position.y = bodyLen + bodyLen * 0.3 + extension * 0.3;
  head.position.y = bodyLen + bodyLen * 0.6 + extension * 0.5;
}

// Calcular posición world del punto de attachment en la cama
function getBedAttachWorld(attachLocal, bedAngle) {
  // Convertir de bedGroup local a pivot local
  const pivotLocal = new THREE.Vector3(
    attachLocal.x - BED_LENGTH / 2,
    attachLocal.y,
    attachLocal.z
  );

  // Rotar por el ángulo de la cama (rotación negativa en Z para elevar el frente)
  const cosA = Math.cos(-bedAngle);
  const sinA = Math.sin(-bedAngle);
  const rotated = new THREE.Vector3(
    pivotLocal.x * cosA - pivotLocal.y * sinA,
    pivotLocal.x * sinA + pivotLocal.y * cosA,
    pivotLocal.z
  );

  // Trasladar a posición world del pivote
  return rotated.add(new THREE.Vector3(BED_PIVOT_X, 0.83, 0));
}

// Entorno decorativo
function setupEnvironment() {
  // Conos de seguridad
  for (let i = -2; i <= 2; i++) {
    const coneGeo = new THREE.ConeGeometry(0.1, 0.4, 8);
    const coneMat = new THREE.MeshStandardMaterial({ color: 0xff6600, roughness: 0.5 });
    const cone = new THREE.Mesh(coneGeo, coneMat);
    cone.position.set(i * 2.5, 0.2, 7);
    cone.castShadow = true;
    scene.add(cone);

    const bandGeo = new THREE.CylinderGeometry(0.065, 0.07, 0.04, 8);
    const bandMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.15 });
    const band = new THREE.Mesh(bandGeo, bandMat);
    band.position.set(i * 2.5, 0.25, 7);
    scene.add(band);
  }

  // Partículas de polvo ambiental
  const count = 400;
  const positions = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 35;
    positions[i * 3 + 1] = Math.random() * 8;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 35;
  }
  const pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const pMat = new THREE.PointsMaterial({ color: 0xf0a500, size: 0.025, transparent: true, opacity: 0.35 });
  const particles = new THREE.Points(pGeo, pMat);
  scene.add(particles);
  window._particles = particles;
}

// === Animación ===
function animate() {
  requestAnimationFrame(animate);

  // Interpolación suave del ángulo
  const lerpSpeed = 0.02 * speedMultiplier;
  currentAngle += (targetAngle - currentAngle) * lerpSpeed;
  currentAngle = THREE.MathUtils.clamp(currentAngle, 0, MAX_ANGLE);

  // Rotación del pivote: ángulo NEGATIVO en Z eleva el frente (-X) de la cama
  if (bedPivotGroup) {
    bedPivotGroup.rotation.z = -currentAngle;
  }

  // Actualizar cilindros hidráulicos con IK
  const attachLeft = getBedAttachWorld(CYL_ATTACH_LOCAL_LEFT, currentAngle);
  const attachRight = getBedAttachWorld(CYL_ATTACH_LOCAL_RIGHT, currentAngle);
  updateCylinderIK(cylLeft, CYL_BASE_POS_LEFT, attachLeft);
  updateCylinderIK(cylRight, CYL_BASE_POS_RIGHT, attachRight);

  // Actualizar display del ángulo
  const angleDeg = Math.round(THREE.MathUtils.radToDeg(currentAngle));
  document.getElementById('angleDisplay').textContent = angleDeg + '°';

  // Animar partículas
  if (window._particles) {
    const pos = window._particles.geometry.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      pos.array[i * 3 + 1] += 0.002;
      if (pos.array[i * 3 + 1] > 8) pos.array[i * 3 + 1] = 0;
    }
    pos.needsUpdate = true;
  }

  controls.update();
  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

setTimeout(() => showToast('Modelo cargado — usa los controles para operar el remolque'), 800);
